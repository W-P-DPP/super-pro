name: super-pro

services:
  web:
    build:
      context: .
      target: web
    image: super-pro-web:latest
    restart: unless-stopped
    depends_on:
      general-server:
        condition: service_started
      agent-server:
        condition: service_started
      reimburse-server:
        condition: service_started
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - super-pro

  general-server:
    build:
      context: .
      target: general-server
    image: super-pro-general-server:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 30010
      REDIS_URL: redis://redis:6379
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      DB_NAME: ${MYSQL_DATABASE:-wxbot}
      FILE_ROOT_PATH: /data/files
      RUBBISH_ROOT_PATH: /data/rubbish
      FILE_UPLOAD_CHUNK_ROOT_PATH: /data/upload-chunks
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ENABLED: ${JWT_ENABLED:-true}
    volumes:
      - general_public:/app/general-server/public
      - general_files:/data/files
      - general_rubbish:/data/rubbish
      - general_upload_chunks:/data/upload-chunks
    networks:
      - super-pro

  agent-server:
    build:
      context: .
      target: agent-server
    image: super-pro-agent-server:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 30012
      REDIS_URL: redis://redis:6379
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      DB_NAME: ${MYSQL_DATABASE:-wxbot}
      KNOWLEDGE_STORAGE_ROOT: /data/knowledge
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ENABLED: ${JWT_ENABLED:-true}
    volumes:
      - agent_knowledge:/data/knowledge
    networks:
      - super-pro

  reimburse-server:
    build:
      context: .
      target: reimburse-server
    image: super-pro-reimburse-server:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      general-server:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 30022
      REDIS_URL: redis://redis:6379
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      DB_NAME: ${MYSQL_DATABASE:-wxbot}
      FILE_SERVER_API_BASE_URL: http://general-server:30010/api
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ENABLED: ${JWT_ENABLED:-true}
    networks:
      - super-pro

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wxbot}
      MYSQL_USER: ${MYSQL_USER:-superpro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-superpro_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - super-pro

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - super-pro

networks:
  super-pro:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  general_public:
  general_files:
  general_rubbish:
  general_upload_chunks:
  agent_knowledge:
